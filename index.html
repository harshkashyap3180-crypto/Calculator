<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Calculator</title>
  <link rel="stylesheet" href="cal.css">
</head>

<body>
  
  <div class="container">
    
    <section class="display-section">
      <h2 class="screen" id="screen"></h2>
    </section>
    <section class="but-section">
      <button type="submit" class="but">1</button>
      <button type="submit" class="but">2</button>
      <button type="submit" class="but">3</button>
      <button type="submit" class="but">+</button>
      
      <button type="submit" class="but">4</button>
      <button type="submit" class="but">5</button>
      <button type="submit" class="but">6</button>
      <button type="submit" class="but">-</button>
      
      <button type="submit" class="but">7</button>
      <button type="submit" class="but">8</button>
      <button type="submit" class="but">9</button>
      <button type="submit" class="but">*</button>
      
      <button type="submit" class="but">0</button>
      <button type="submit" class="but" id="clear">C</button>
      <button id="ans" type="submit" class="but">=</button>
      <button type="submit" class="but">/</button>
    </section>
  </div>
  
  
  <script src="cal.js"></script>
</body>

</html>
